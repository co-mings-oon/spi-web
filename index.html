<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SPI語彙トレーナー</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">SPI Language Prep</p>
        <h1>SPI語彙トレーナー</h1>
      </div>
      <div class="score-chip" aria-live="polite">
        <span class="score-label">正答率</span>
        <strong id="accuracy">--%</strong>
      </div>
    </header>

    <main class="app-shell">
      <section class="control-panel" aria-label="学習設定">
        <div class="panel-group">
          <h2>出題モード</h2>
          <div class="segmented" role="tablist" aria-label="出題モード">
            <button class="mode-button is-active" type="button" data-mode="all">全範囲</button>
            <button class="mode-button" type="button" data-mode="weak">苦手</button>
            <button class="mode-button" type="button" data-mode="fresh">未回答</button>
          </div>
        </div>

        <div class="panel-group">
          <h2>ジャンル</h2>
          <label class="select-row">
            <span>出題</span>
            <select id="questionGenre">
              <option value="random" selected>ランダム</option>
              <option value="meaning">語句の意味</option>
              <option value="idiom">熟語</option>
              <option value="usage">語句の用法</option>
            </select>
          </label>
        </div>

        <div class="panel-group">
          <h2>問題形式</h2>
          <label class="toggle-row">
            <input id="reverseMode" type="checkbox" />
            <span>意味 → 語句で出題</span>
          </label>
          <label class="toggle-row">
            <input id="shuffleChoices" type="checkbox" checked />
            <span>選択肢を毎回シャッフル</span>
          </label>
        </div>

        <div class="panel-group">
          <h2>セット数</h2>
          <label class="select-row">
            <span>1セット</span>
            <select id="setSize">
              <option value="5">5問</option>
              <option value="10" selected>10問</option>
              <option value="20">20問</option>
              <option value="30">30問</option>
            </select>
          </label>
        </div>

        <div class="panel-group">
          <h2>学習状況</h2>
          <div class="stats-grid">
            <div>
              <span>回答数</span>
              <strong id="answeredCount">0</strong>
            </div>
            <div>
              <span>正解</span>
              <strong id="correctCount">0</strong>
            </div>
            <div>
              <span>苦手</span>
              <strong id="weakCount">0</strong>
            </div>
            <div>
              <span>収録</span>
              <strong id="totalCount">0</strong>
            </div>
          </div>
        </div>

        <div class="panel-actions">
          <button id="resetProgress" class="secondary-button" type="button">進捗をリセット</button>
        </div>
      </section>

      <section class="quiz-panel" aria-label="語彙問題">
        <div class="quiz-toolbar">
          <div class="progress-track" aria-label="このセッションの進捗">
            <span id="sessionProgress" style="width: 0%"></span>
          </div>
          <span id="sessionCount" class="session-count">0 / 10</span>
        </div>

        <article class="question-card">
          <div class="question-meta">
            <span id="categoryBadge">二語関係</span>
            <span id="difficultyBadge">標準</span>
          </div>
          <p id="promptLabel" class="prompt-label">次の語句の意味として最も近いものを選んでください。</p>
          <h2 id="questionText">読み込み中</h2>
          <div id="choices" class="choices" aria-label="選択肢"></div>
          <div class="question-actions">
            <button id="addToReview" class="review-add-button" type="button" disabled>復習に追加</button>
            <button id="nextQuestion" class="next-button" type="button" disabled>
              <span>次の問題</span>
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M5 12h12M13 6l6 6-6 6" />
              </svg>
            </button>
          </div>
          <div id="feedback" class="feedback" aria-live="polite"></div>
        </article>
      </section>

      <section class="review-panel" aria-label="復習リスト">
        <div class="review-header">
          <h2>復習リスト</h2>
          <button id="clearWeak" class="text-button" type="button">苦手を解除</button>
        </div>
        <div id="reviewList" class="review-list"></div>
      </section>
    </main>

    <template id="choiceTemplate">
      <button class="choice-button" type="button"></button>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
