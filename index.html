<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SPI語句対策</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">SPI Language Prep</p>
        <h1>SPI語句対策</h1>
      </div>
      <div class="score-chip" aria-live="polite">
        <span class="score-label">正答率</span>
        <strong id="accuracy">--%</strong>
      </div>
    </header>

    <main class="app-shell">
      <section class="control-panel" aria-label="学習設定">
        <div class="panel-group">
          <h2>出題モード</h2>
          <div class="segmented" role="tablist" aria-label="出題モード">
            <button class="mode-button is-active" type="button" data-mode="all">全範囲</button>
            <button class="mode-button" type="button" data-mode="weak">苦手</button>
            <button class="mode-button" type="button" data-mode="fresh">未回答</button>
          </div>
        </div>
        <div class="panel-group">
          <h2>問題形式</h2>
          <div class="direction-segmented segmented" role="tablist" aria-label="問題形式">
            <button class="direction-button is-active" type="button" data-direction="term-to-meaning">語句 → 意味</button>
            <button class="direction-button" type="button" data-direction="meaning-to-term">意味 → 語句</button>
          </div>
        </div>

        <div class="panel-group">
          <h2>セット数</h2>
          <div class="set-size-segmented segmented" role="tablist" aria-label="セット数">
            <button class="set-size-button" type="button" data-set-size="5">5問</button>
            <button class="set-size-button is-active" type="button" data-set-size="10">10問</button>
            <button class="set-size-button" type="button" data-set-size="20">20問</button>
            <button class="set-size-button" type="button" data-set-size="30">30問</button>
          </div>
        </div>

        <div class="panel-group">
          <h2>学習状況</h2>
          <div class="stats-grid">
            <div>
              <span>回答数</span>
              <strong id="answeredCount">0</strong>
            </div>
            <div>
              <span>正解</span>
              <strong id="correctCount">0</strong>
            </div>
            <div>
              <span>苦手</span>
              <strong id="weakCount">0</strong>
            </div>
            <div>
              <span>収録</span>
              <strong id="totalCount">0</strong>
            </div>
          </div>
        </div>

        <div class="panel-actions">
          <button id="startSet" class="primary-button" type="button">開始</button>
          <button id="showStudyList" class="secondary-button" type="button">一覧で学習</button>
        </div>
      </section>

      <section class="quiz-panel" aria-label="語彙問題">
        <div class="quiz-toolbar">
          <div class="progress-track" aria-label="このセッションの進捗">
            <span id="sessionProgress" style="width: 0%"></span>
          </div>
          <span id="sessionCount" class="session-count">0 / 10</span>
        </div>

        <article class="question-card">
          <p id="promptLabel" class="prompt-label">次の語句の意味として最も近いものを選んでください。</p>
          <h2 id="questionText">読み込み中</h2>
          <div id="choices" class="choices" aria-label="選択肢"></div>
          <div class="question-actions">
            <button id="unknownQuestion" class="unknown-button" type="button">わからない</button>
            <button id="addToReview" class="review-add-button" type="button" disabled>復習に追加</button>
            <button id="homeButton" class="review-add-button" type="button" hidden>ホームに戻る</button>
            <button id="nextQuestion" class="next-button" type="button" disabled>
              <span>次の問題</span>
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M5 12h12M13 6l6 6-6 6" />
              </svg>
            </button>
          </div>
          <div id="feedback" class="feedback" aria-live="polite"></div>
        </article>
      </section>

      <section id="studyPanel" class="study-panel" aria-label="収録問題一覧" hidden>
        <div class="study-header">
          <div>
            <h2>収録問題一覧</h2>
            <span id="studyCount" class="study-count">0件</span>
          </div>
          <button id="closeStudyList" class="text-button" type="button">閉じる</button>
        </div>
        <input id="studySearch" class="study-search" type="search" placeholder="語句や意味で検索" autocomplete="off" />
        <div id="studyList" class="study-list"></div>
      </section>

      <section class="review-panel" aria-label="復習リスト">
        <div class="review-header">
          <h2>復習リスト</h2>
          <button id="clearWeak" class="text-button" type="button">苦手を解除</button>
        </div>
        <div id="reviewList" class="review-list"></div>
      </section>
    </main>

    <template id="choiceTemplate">
      <button class="choice-button" type="button"></button>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
